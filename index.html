<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MP3 Player">
  <meta name="description" content="MP3 přehrávač s vizualizacemi — Bars, Osciloskop, Plazma, Circle, Spectrum">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-192.png">
  <title>MP3 Player</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #050508;
      --bg3: #0e0e14;
      --border: #1a1a25;
      --accent: #7affb2;
      --accent-dark: #1a8a55;
      --accent-dim: #0d4a2a;
      --text: #eeeeee;
      --text2: #555555;
      --text3: #333333;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      overscroll-behavior: none;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #player {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      background: var(--bg);
    }

    /* ── Visualizer ── */
    #viz-container {
      position: relative;
      width: 100%;
      flex-shrink: 0;
      height: 240px;
      background: var(--bg2);
      overflow: hidden;
      cursor: pointer;
    }
    @media (max-height: 700px) { #viz-container { height: 160px; } }
    #viz-canvas { display: block; width: 100%; height: 100%; }
    #viz-label {
      position: absolute;
      top: 10px; right: 12px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ── Viz tabs ── */
    #viz-tabs {
      display: flex;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    #viz-tabs::-webkit-scrollbar { display: none; }
    .vtab {
      flex: 1;
      min-width: 60px;
      padding: 10px 4px;
      font-size: 10px;
      letter-spacing: 1px;
      text-align: center;
      color: var(--text2);
      cursor: pointer;
      border: none;
      background: transparent;
      transition: color 0.2s, background 0.2s;
      font-family: inherit;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .vtab:hover { color: #888; background: #13131a; }
    .vtab.active { color: var(--accent); background: #0d1a14; }

    /* ── Track info ── */
    #track-info {
      padding: 14px 18px 6px;
    }
    #track-title {
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.5px;
    }
    #track-sub {
      font-size: 11px;
      color: var(--text2);
      margin-top: 3px;
      letter-spacing: 1px;
    }

    /* ── Progress ── */
    #progress-area { padding: 8px 18px; }
    #progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      margin-bottom: 6px;
      touch-action: none;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-dark), var(--accent));
      border-radius: 2px;
      width: 0%;
    }
    #time-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text2);
      letter-spacing: 1px;
    }

    /* ── Controls ── */
    #controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px 12px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 20px;
      padding: 8px 10px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
      font-family: inherit;
      line-height: 1;
      touch-action: manipulation;
    }
    .ctrl-btn:active { color: var(--accent); background: #0d1a14; }
    #play-btn {
      width: 58px; height: 58px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1.5px solid var(--accent-dark);
      color: var(--accent);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    #play-btn:active { transform: scale(0.94); background: #112518; border-color: var(--accent); }

    /* ── Volume ── */
    #volume-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #vol-icon { font-size: 14px; color: var(--text2); }
    #vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 72px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    #vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent-dark);
      cursor: pointer;
    }
    #vol-slider::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent-dark);
      cursor: pointer;
      border: none;
    }

    /* ── Playlist ── */
    #playlist-area {
      flex: 1;
      overflow-y: auto;
      border-top: 1px solid var(--border);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #playlist-area::-webkit-scrollbar { width: 4px; }
    #playlist-area::-webkit-scrollbar-thumb { background: var(--border); }
    .pl-item {
      display: flex;
      align-items: center;
      padding: 10px 18px;
      gap: 12px;
      cursor: pointer;
      border-bottom: 1px solid #111118;
      transition: background 0.15s;
    }
    .pl-item:active { background: #0d1a14; }
    .pl-item.active { background: #0d1a14; }
    .pl-num {
      font-size: 11px;
      color: var(--text3);
      min-width: 22px;
      text-align: right;
    }
    .pl-item.active .pl-num { color: var(--accent); }
    .pl-name {
      font-size: 13px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .pl-item.active .pl-name { color: var(--accent); }
    .pl-dur { font-size: 11px; color: var(--text3); }

    /* ── Upload ── */
    #upload-area {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .upload-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 11px 8px;
      background: var(--bg3);
      border: 1px dashed #2a2a35;
      border-radius: 8px;
      color: var(--text2);
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      font-family: inherit;
      text-transform: uppercase;
      touch-action: manipulation;
      text-align: center;
    }
    .upload-btn:active { border-color: var(--accent-dark); color: var(--accent); }
    #file-input, #folder-input { display: none; }

    /* ── Install banner ── */
    #install-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 18px;
      background: #0d1a14;
      border-top: 1px solid var(--accent-dark);
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    #install-banner button {
      background: var(--accent-dark);
      border: none;
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    #install-dismiss {
      background: none !important;
      color: var(--text2) !important;
      padding: 6px !important;
    }

    /* ── Empty state ── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      color: var(--text3);
      font-size: 12px;
      letter-spacing: 1px;
      padding: 40px 20px;
    }
    #empty-state .big { font-size: 40px; }
  </style>
</head>
<body>
<div id="player">

  <div id="viz-container">
    <canvas id="viz-canvas"></canvas>
    <div id="viz-label">bars</div>
  </div>

  <div id="viz-tabs">
    <button class="vtab active" data-viz="bars">Bars</button>
    <button class="vtab" data-viz="scope">Scope</button>
    <button class="vtab" data-viz="plasma">Plasma</button>
    <button class="vtab" data-viz="circle">Circle</button>
    <button class="vtab" data-viz="spectrum">Spectrum</button>
  </div>

  <div id="track-info">
    <div id="track-title">— žádná skladba —</div>
    <div id="track-sub">nahraj MP3 níže</div>
  </div>

  <div id="progress-area">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="time-row">
      <span id="time-cur">0:00</span>
      <span id="time-dur">0:00</span>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-prev" title="Předchozí">⏮</button>
    <button class="ctrl-btn" id="btn-rew" title="−10s">⏪</button>
    <button id="play-btn">▶</button>
    <button class="ctrl-btn" id="btn-fwd" title="+10s">⏩</button>
    <button class="ctrl-btn" id="btn-next" title="Další">⏭</button>
    <div id="volume-area">
      <span id="vol-icon">🔊</span>
      <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8">
    </div>
  </div>

  <div id="playlist-area">
    <div id="empty-state">
      <div class="big">♫</div>
      <div>Přidej MP3 soubory</div>
    </div>
    <div id="playlist"></div>
  </div>

  <div id="upload-area">
    <label class="upload-btn" for="file-input">＋ Soubory</label>
    <label class="upload-btn" for="folder-input">📁 Složka</label>
    <input type="file" id="file-input" accept="audio/*" multiple>
    <input type="file" id="folder-input" webkitdirectory multiple>
  </div>

  <div id="install-banner">
    <span>📲 Nainstalovat jako aplikaci</span>
    <button id="install-btn">Instalovat</button>
    <button id="install-dismiss">✕</button>
  </div>

</div>

<audio id="audio-el" preload="metadata"></audio>

<script>
// ── Audio Engine ──
const audio = document.getElementById('audio-el');
let audioCtx, analyser, source, dataArr, waveArr;
let vizMode = 'bars';
let playlist = [];
let currentIdx = -1;
let isPlaying = false;
let plasmaT = 0;

function setupAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.82;
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  dataArr = new Uint8Array(analyser.frequencyBinCount);
  waveArr = new Uint8Array(analyser.fftSize);
}

// ── Canvas ──
const canvas = document.getElementById('viz-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  const c = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = c.offsetWidth * dpr;
  canvas.height = c.offsetHeight * dpr;
  canvas.style.width = c.offsetWidth + 'px';
  canvas.style.height = c.offsetHeight + 'px';
  ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize);
resize();

// ── Visualizers ──
function drawBars() {
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, W, H);
  const count = Math.floor(W / 7);
  const barW = (W / count) * 0.65;
  for (let i = 0; i < count; i++) {
    const idx = Math.floor(i / count * dataArr.length * 0.65);
    const v = dataArr[idx] / 255;
    const h = Math.max(2, v * H * 0.92);
    const x = i * (W / count) + (W / count - barW) / 2;
    const g = ctx.createLinearGradient(0, H, 0, H - h);
    g.addColorStop(0, '#0d4a2a');
    g.addColorStop(0.6, '#1a8a55');
    g.addColorStop(1, v > 0.65 ? '#ffff80' : '#7affb2');
    ctx.fillStyle = g;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, H - h, barW, h, 2);
    else ctx.rect(x, H - h, barW, h);
    ctx.fill();
  }
}

function drawScope() {
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#0a1f12';
  ctx.lineWidth = 1;
  for (let y = 0; y <= H; y += H / 5) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.beginPath();
  ctx.strokeStyle = '#7affb2';
  ctx.lineWidth = 1.8;
  ctx.shadowColor = '#7affb2';
  ctx.shadowBlur = 8;
  const step = W / waveArr.length;
  for (let i = 0; i < waveArr.length; i++) {
    const v = waveArr[i] / 128 - 1;
    const y = v * H * 0.42 + H / 2;
    i === 0 ? ctx.moveTo(0, y) : ctx.lineTo(i * step, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawPlasma() {
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  const avgVol = dataArr.reduce((a, b) => a + b, 0) / dataArr.length / 255;
  plasmaT += 0.035 + avgVol * 0.05;
  const iW = Math.floor(W / 2), iH = Math.floor(H / 2);
  const imageData = ctx.createImageData(iW, iH);
  const d = imageData.data;
  const bass = dataArr[3] / 255;
  const mid = dataArr[40] / 255;
  const hi = dataArr[120] / 255;
  for (let y = 0; y < iH; y++) {
    for (let x = 0; x < iW; x++) {
      const cx = x / iW, cy = y / iH;
      const s1 = Math.sin(cx * 4 + plasmaT);
      const s2 = Math.sin(cy * 3 - plasmaT * 0.7);
      const s3 = Math.sin((cx + cy) * 3.5 + plasmaT * 1.2);
      const s4 = Math.sin(Math.sqrt((cx - 0.5) ** 2 + (cy - 0.5) ** 2) * 8 - plasmaT);
      const n = ((s1 + s2 + s3 + s4) / 4 + 1) / 2;
      const r = Math.floor(Math.sin(n * Math.PI * 2 + bass * 2) * 100 + 80 + bass * 80);
      const g2 = Math.floor(Math.sin(n * Math.PI * 2 + 2 + mid * 2) * 80 + 60 + mid * 100);
      const b = Math.floor(Math.sin(n * Math.PI * 2 + 4 + hi * 2) * 120 + 100 + hi * 60);
      const p = (y * iW + x) * 4;
      d[p] = Math.max(0, Math.min(255, r));
      d[p + 1] = Math.max(0, Math.min(255, g2));
      d[p + 2] = Math.max(0, Math.min(255, b));
      d[p + 3] = 255;
    }
  }
  const tmp = document.createElement('canvas');
  tmp.width = iW; tmp.height = iH;
  tmp.getContext('2d').putImageData(imageData, 0, 0);
  ctx.drawImage(tmp, 0, 0, W, H);
}

function drawCircle() {
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2;
  const r = Math.min(W, H) * 0.27;
  const count = 128;
  ctx.strokeStyle = '#0a2a18';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
    const v = dataArr[Math.floor(i / count * dataArr.length * 0.7)] / 255;
    const outer = r + v * r * 0.95;
    const x1 = cx + Math.cos(angle) * r;
    const y1 = cy + Math.sin(angle) * r;
    const x2 = cx + Math.cos(angle) * outer;
    const y2 = cy + Math.sin(angle) * outer;
    const g = ctx.createLinearGradient(x1, y1, x2, y2);
    g.addColorStop(0, '#1a8a55');
    g.addColorStop(1, v > 0.6 ? '#ffff80' : '#7affb2');
    ctx.strokeStyle = g;
    ctx.lineWidth = 2.2;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }
  const avg = dataArr.reduce((a, b) => a + b, 0) / dataArr.length / 255;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.38 * (0.8 + avg * 0.5), 0, Math.PI * 2);
  ctx.fillStyle = `rgba(122,255,178,${avg * 0.28})`;
  ctx.fill();
}

function drawSpectrum() {
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  ctx.fillStyle = 'rgba(5,5,8,0.18)';
  ctx.fillRect(0, 0, W, H);
  const count = Math.min(dataArr.length / 2, 512);
  const bw = W / count;
  for (let i = 0; i < count; i++) {
    const v = dataArr[i] / 255;
    const hue = (i / count) * 280;
    ctx.fillStyle = `hsl(${hue},90%,${15 + v * 55}%)`;
    ctx.fillRect(i * bw, H - v * H, bw + 0.5, v * H);
  }
}

// ── Animation loop ──
function loop() {
  if (analyser) {
    analyser.getByteFrequencyData(dataArr);
    analyser.getByteTimeDomainData(waveArr);
  } else {
    if (!dataArr) { dataArr = new Uint8Array(1024); waveArr = new Uint8Array(2048); }
  }
  if (vizMode === 'bars') drawBars();
  else if (vizMode === 'scope') drawScope();
  else if (vizMode === 'plasma') drawPlasma();
  else if (vizMode === 'circle') drawCircle();
  else if (vizMode === 'spectrum') drawSpectrum();
  requestAnimationFrame(loop);
}
loop();

// ── Helpers ──
function fmt(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function setPlaying(v) {
  isPlaying = v;
  document.getElementById('play-btn').textContent = v ? '⏸' : '▶';
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = v ? 'playing' : 'paused';
}

// ── Playlist ──
function renderPlaylist() {
  const el = document.getElementById('playlist');
  const empty = document.getElementById('empty-state');
  if (playlist.length === 0) { empty.style.display = 'flex'; el.innerHTML = ''; return; }
  empty.style.display = 'none';
  el.innerHTML = playlist.map((t, i) => `
    <div class="pl-item ${i === currentIdx ? 'active' : ''}" data-idx="${i}">
      <span class="pl-num">${i + 1}</span>
      <span class="pl-name">${t.name}</span>
      <span class="pl-dur">${t.dur || ''}</span>
    </div>
  `).join('');
  el.querySelectorAll('.pl-item').forEach(el2 => {
    el2.addEventListener('click', () => {
      loadTrack(+el2.dataset.idx);
      audio.play();
      setPlaying(true);
    });
  });
}

function loadTrack(idx) {
  currentIdx = idx;
  const t = playlist[idx];
  audio.src = t.url;
  document.getElementById('track-title').textContent = t.name;
  document.getElementById('track-sub').textContent = (idx + 1) + ' / ' + playlist.length;
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('time-cur').textContent = '0:00';
  document.getElementById('time-dur').textContent = t.dur || '0:00';
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({ title: t.name });
  }
  renderPlaylist();
}

// ── File loading ──
function handleFiles(fileList) {
  const AUDIO_EXTS = /\.(mp3|flac|ogg|wav|aac|m4a|opus|weba|webm)$/i;
  const files = Array.from(fileList).filter(f => f.type.startsWith('audio/') || AUDIO_EXTS.test(f.name));
  if (!files.length) return;
  // Sort: by path then name so folder structure is ordered
  files.sort((a, b) => (a.webkitRelativePath || a.name).localeCompare(b.webkitRelativePath || b.name));
  const newTracks = files.map(f => ({
    name: (f.webkitRelativePath || f.name).replace(/\/[^\/]+$/, '').replace(/.*\//, '') 
          ? (f.webkitRelativePath || f.name).replace(/\.[^.]+$/, '').replace(/^.*\//, '')
          : f.name.replace(/\.[^.]+$/, ''),
    url: URL.createObjectURL(f),
    dur: ''
  }));
  const wasEmpty = currentIdx === -1;
  playlist = [...playlist, ...newTracks];
  newTracks.forEach(t => {
    const tmp = new Audio(t.url);
    tmp.addEventListener('loadedmetadata', () => {
      const found = playlist.find(p => p.url === t.url);
      if (found) { found.dur = fmt(tmp.duration); renderPlaylist(); }
    });
  });
  if (wasEmpty) {
    loadTrack(0);
    if (!audioCtx) setupAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audio.play().then(() => setPlaying(true)).catch(() => {});
  } else {
    renderPlaylist();
  }
}

document.getElementById('file-input').addEventListener('change', e => {
  handleFiles(e.target.files);
  e.target.value = '';
});
document.getElementById('folder-input').addEventListener('change', e => {
  handleFiles(e.target.files);
  e.target.value = '';
});

// ── Playback controls ──
document.getElementById('play-btn').addEventListener('click', () => {
  if (currentIdx === -1) return;
  if (!audioCtx) setupAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (audio.paused) { audio.play(); setPlaying(true); }
  else { audio.pause(); setPlaying(false); }
});

document.getElementById('btn-rew').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 10); });
document.getElementById('btn-fwd').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); });
document.getElementById('btn-prev').addEventListener('click', () => {
  if (currentIdx > 0) { loadTrack(currentIdx - 1); audio.play(); setPlaying(true); }
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (currentIdx < playlist.length - 1) { loadTrack(currentIdx + 1); audio.play(); setPlaying(true); }
});

audio.addEventListener('ended', () => {
  if (currentIdx < playlist.length - 1) { loadTrack(currentIdx + 1); audio.play(); setPlaying(true); }
  else setPlaying(false);
});

// ── Progress bar ──
const progressBar = document.getElementById('progress-bar');
let dragging = false;

function seekTo(e) {
  if (!audio.duration) return;
  const rect = progressBar.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  audio.currentTime = Math.max(0, Math.min(1, x / rect.width)) * audio.duration;
}
progressBar.addEventListener('click', seekTo);
progressBar.addEventListener('touchstart', e => { dragging = true; seekTo(e); }, { passive: true });
progressBar.addEventListener('touchmove', e => { if (dragging) seekTo(e); }, { passive: true });
progressBar.addEventListener('touchend', () => { dragging = false; });

audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-cur').textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('time-dur').textContent = fmt(audio.duration);
});

// ── Volume ──
const volSlider = document.getElementById('vol-slider');
volSlider.addEventListener('input', () => { audio.volume = volSlider.value; });
audio.volume = 0.8;

// ── Viz tabs ──
document.querySelectorAll('.vtab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    vizMode = tab.dataset.viz;
    document.getElementById('viz-label').textContent = tab.dataset.viz;
  });
});

// ── Media Session API (lock screen controls) ──
if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', () => { audio.play(); setPlaying(true); });
  navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); setPlaying(false); });
  navigator.mediaSession.setActionHandler('previoustrack', () => {
    if (currentIdx > 0) { loadTrack(currentIdx - 1); audio.play(); setPlaying(true); }
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => {
    if (currentIdx < playlist.length - 1) { loadTrack(currentIdx + 1); audio.play(); setPlaying(true); }
  });
  navigator.mediaSession.setActionHandler('seekbackward', () => { audio.currentTime -= 10; });
  navigator.mediaSession.setActionHandler('seekforward', () => { audio.currentTime += 10; });
}

// ── PWA Install ──
let deferredPrompt;
const installBanner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const installDismiss = document.getElementById('install-dismiss');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.style.display = 'flex';
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.style.display = 'none';
});

installDismiss.addEventListener('click', () => {
  installBanner.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  installBanner.style.display = 'none';
});

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
